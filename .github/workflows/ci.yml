name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    if: github.event_name != 'pull_request_review' || github.event.pull_request.base.ref == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: windows-latest
            name: windows-x64
          - os: ubuntu-24.04-arm
            name: linux-arm64
          - os: windows-11-arm
            name: windows-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" -- RunConfiguration.TreatNoTestsAsError=true

      - name: Enforce PR approval policy
        if: github.event_name != 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const bypassUser = 'validation-bypass-user';
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info('No pull request in event payload; skipping approval enforcement.');
              return;
            }

            if (pr.draft) {
              core.info(`PR #${pr.number} is a draft; skipping approval enforcement.`);
              return;
            }

            if (pr.user.login === bypassUser) {
              core.info(`PR author ${pr.user.login} can bypass the approval requirement.`);
              return;
            }

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const latestReviewByUser = new Map();
            for (const review of reviews) {
              if (!review.user?.login) {
                continue;
              }

              latestReviewByUser.set(review.user.login, review);
            }

            const qualifyingApprovals = [...latestReviewByUser.values()].filter(review =>
              review.state === 'APPROVED' &&
              review.user.login !== pr.user.login &&
              review.commit_id === pr.head.sha
            );

            if (qualifyingApprovals.length === 0) {
              core.setFailed(
                `PR #${pr.number} requires at least one non-author approval on the current head commit ${pr.head.sha}.`
              );
              return;
            }

            core.info(
              `Found qualifying approval(s) from: ${qualifyingApprovals.map(review => review.user.login).join(', ')}`
            );

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.name }}
          path: '**/test-results.trx'

